name: Temporary German Translation Model Export

on:
  pull_request:
    branches: [main]

jobs:
  export-model:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install model downloader
        run: pip install --disable-pip-version-check huggingface_hub
      - name: Download NLLB model
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='facebook/nllb-200-distilled-600M',
              local_dir='nllb-source',
              allow_patterns=['*.json','*.safetensors','*.bin','*.model','*.spm','*.txt','tokenizer*'],
          )
          PY
      - name: Package and split model
        run: |
          tar -czf nllb-model.tar.gz nllb-source
          split -b 340M nllb-model.tar.gz nllb-part-
          ls -lh nllb-part-*
      - name: Upload part aa
        uses: actions/upload-artifact@v4
        with:
          name: nllb-part-aa
          path: nllb-part-aa
          retention-days: 1
      - name: Upload part ab
        uses: actions/upload-artifact@v4
        with:
          name: nllb-part-ab
          path: nllb-part-ab
          retention-days: 1
      - name: Upload part ac
        uses: actions/upload-artifact@v4
        with:
          name: nllb-part-ac
          path: nllb-part-ac
          retention-days: 1
      - name: Upload part ad
        uses: actions/upload-artifact@v4
        with:
          name: nllb-part-ad
          path: nllb-part-ad
          retention-days: 1
