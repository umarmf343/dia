name: Temporary German Translation Model Export

on:
  pull_request:
    branches: [main]

jobs:
  export-model:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install model downloader
        run: pip install --disable-pip-version-check huggingface_hub
      - name: Download NLLB model
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='facebook/nllb-200-distilled-600M',
              local_dir='nllb-source',
              allow_patterns=['*.json','*.safetensors','*.bin','*.model','*.spm','*.txt','tokenizer*'],
          )
          PY
      - name: Package and split model without compression
        run: |
          tar -cf nllb-model.tar nllb-source
          split -b 250M nllb-model.tar nllb-raw-part-
          ls -lh nllb-raw-part-*
      - name: Upload aa
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-aa, path: nllb-raw-part-aa, retention-days: 1}
      - name: Upload ab
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ab, path: nllb-raw-part-ab, retention-days: 1}
      - name: Upload ac
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ac, path: nllb-raw-part-ac, retention-days: 1}
      - name: Upload ad
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ad, path: nllb-raw-part-ad, retention-days: 1}
      - name: Upload ae
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ae, path: nllb-raw-part-ae, retention-days: 1}
      - name: Upload af
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-af, path: nllb-raw-part-af, retention-days: 1}
      - name: Upload ag
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ag, path: nllb-raw-part-ag, retention-days: 1}
      - name: Upload ah
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ah, path: nllb-raw-part-ah, retention-days: 1}
      - name: Upload ai
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-ai, path: nllb-raw-part-ai, retention-days: 1}
      - name: Upload aj
        uses: actions/upload-artifact@v4
        with: {name: nllb-raw-aj, path: nllb-raw-part-aj, retention-days: 1}
