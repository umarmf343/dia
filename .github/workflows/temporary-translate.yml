name: Temporary German Translation Model Export

on:
  pull_request:
    branches: [main]

jobs:
  export-model:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install model tools
        run: pip install --disable-pip-version-check transformers sentencepiece sacremoses huggingface_hub
      - name: Download English to German model
        run: |
          python - <<'PY'
          from transformers import AutoTokenizer, AutoModelForSeq2SeqLM
          model_id='Helsinki-NLP/opus-mt-en-de'
          tok=AutoTokenizer.from_pretrained(model_id)
          model=AutoModelForSeq2SeqLM.from_pretrained(model_id)
          tok.save_pretrained('hf-en-de-model')
          model.save_pretrained('hf-en-de-model', safe_serialization=True)
          PY
      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: hf-en-de-model
          path: hf-en-de-model
          retention-days: 1
