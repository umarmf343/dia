name: Temporary German Translation Model Export

on:
  pull_request:
    branches: [main]

jobs:
  export-model:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install model tools
        run: pip install --disable-pip-version-check huggingface_hub
      - name: Download English to German model files
        run: |
          python - <<'PY'
          from huggingface_hub import snapshot_download
          snapshot_download(
              repo_id='Helsinki-NLP/opus-mt-en-de',
              local_dir='hf-en-de-model',
              allow_patterns=['*.json','*.safetensors','*.bin','*.model','*.spm','*.txt'],
          )
          PY
      - name: Upload model
        uses: actions/upload-artifact@v4
        with:
          name: hf-en-de-model
          path: hf-en-de-model
          retention-days: 1
